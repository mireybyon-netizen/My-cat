<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Логика: Число</title>
    <style>
        body { font-family: sans-serif; background-color: #E3F2FD; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        h1 { color: #1565C0; font-size: 24px; }
        input { width: 80%; font-size: 24px; padding: 10px; border: none; border-bottom: 2px solid #1565C0; text-align: center; margin: 20px 0; outline: none; }
        button { background: #1E88E5; color: white; border: none; padding: 12px 30px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        .reset { margin-top: 20px; color: #1565C0; text-decoration: underline; cursor: pointer; font-size: 14px; }
        .message { min-height: 50px; color: #333; }
    </style>
</head>
<body>

<div class="card">
    <div style="font-size: 50px;">🧠</div>
    <h1>Логика: Число</h1>
    <p id="message" class="message">Угадай число от 1 до 100</p>
    <input type="number" id="guess" placeholder="???">
    <br>
    <button onclick="checkGuess()">ПРОВЕРИТЬ</button>
    <div class="reset" onclick="resetGame()">Начать заново</div>
</div>

<script>
    let target = Math.floor(Math.random() * 100) + 1;
    let attempts = 0;

    function checkGuess() {
        const input = document.getElementById('guess');
        const msg = document.getElementById('message');
        const numGuess = parseInt(input.value);

        if (isNaN(numGuess)) {
            msg.innerText = 'Введите число!';
            return;
        }

        attempts++;
        if (numGuess === target) {
            msg.innerText = `🎉 Победа! Угадано за ${attempts} попыток!`;
            input.value = '';
        } else if (numGuess < target) {
            msg.innerText = '📈 Мало! Бери выше';
        } else {
            msg.innerText = '📉 Много! Бери ниже';
        }
        input.value = '';
    }

    function resetGame() {
        target = Math.floor(Math.random() * 100) + 1;
        attempts = 0;
        document.getElementById('message').innerText = 'Новая игра! От 1 до 100';
        document.getElementById('guess').value = '';
    }
</script>
</body>
</html>
