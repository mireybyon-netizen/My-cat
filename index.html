<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Advanced MOBA Starter</title>
    <style>
        body { margin: 0; background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: #e94560; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { background: #16213e; border: 2px solid #0f3460; box-shadow: 0 0 20px rgba(0,0,0,0.5); border-radius: 8px; }
        .ui-panel { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; background: rgba(15, 52, 96, 0.8); padding: 15px 30px; border-radius: 50px; border: 1px solid #e94560; pointer-events: none; }
        .stat { text-align: center; }
        .stat-value { font-size: 20px; font-weight: bold; color: #fff; }
        .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="ui-panel">
    <div class="stat"><div class="stat-value" id="hp">100</div><div class="stat-label">Health</div></div>
    <div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Kills</div></div>
    <div class="stat"><div class="stat-value" id="ult">Ready</div><div class="stat-label">Ultimate (Space)</div></div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    canvas.width = 1000;
    canvas.height = 700;

    const state = {
        player: {
            x: 500, y: 350, radius: 18, color: '#4eccf3',
            speed: 250, hp: 100, maxHp: 100, score: 0,
            ultReady: true, ultCooldown: 5000
        },
        bullets: [],
        enemies: [],
        particles: [],
        keys: {},
        lastTime: 0
    };

    // Слушатели событий
    window.addEventListener('keydown', e => state.keys[e.code] = true);
    window.addEventListener('keyup', e => state.keys[e.code] = false);
    canvas.addEventListener('mousedown', e => {
        if(e.button === 0) spawnBullet();
    });
    window.addEventListener('keydown', e => {
        if(e.code === 'Space' && state.player.ultReady) useUltimate();
    });

    function spawnBullet() {
        const rect = canvas.getBoundingClientRect();
        const mouseX = event.clientX - rect.left;
        const mouseY = event.clientY - rect.top;
        const angle = Math.atan2(mouseY - state.player.y, mouseX - state.player.x);
        
        state.bullets.push({
            x: state.player.x, y: state.player.y,
            vx: Math.cos(angle) * 500, vy: Math.sin(angle) * 500,
            radius: 4, color: '#f8ef42'
        });
    }

    function useUltimate() {
        state.player.ultReady = false;
        for(let i=0; i<12; i++) {
            const angle = (Math.PI * 2 / 12) * i;
            state.bullets.push({
                x: state.player.x, y: state.player.y,
                vx: Math.cos(angle) * 400, vy: Math.sin(angle) * 400,
                radius: 8, color: '#e94560'
            });
        }
        setTimeout(() => state.player.ultReady = true, state.player.ultCooldown);
    }

    function createExplosion(x, y, color) {
        for(let i=0; i<10; i++) {
            state.particles.push({
                x, y, 
                vx: (Math.random() - 0.5) * 200, 
                vy: (Math.random() - 0.5) * 200,
                life: 1.0, color
            });
        }
    }

    function spawnEnemy() {
        const edge = Math.floor(Math.random() * 4);
        let x, y;
        if(edge === 0) { x = Math.random()*canvas.width; y = -20; }
        else if(edge === 1) { x = canvas.width+20; y = Math.random()*canvas.height; }
        else if(edge === 2) { x = Math.random()*canvas.width; y = canvas.height+20; }
        else { x = -20; y = Math.random()*canvas.height; }

        state.enemies.push({
            x, y, radius: 22, color: '#ff4d4d',
            speed: 80 + Math.random() * 50,
            hp: 30, maxHp: 30
        });
    }

    setInterval(spawnEnemy, 1500);

    function update(dt) {
        const p = state.player;
        
        // Движение
        if (state.keys['KeyW']) p.y -= p.speed * dt;
        if (state.keys['KeyS']) p.y += p.speed * dt;
        if (state.keys['KeyA']) p.x -= p.speed * dt;
        if (state.keys['KeyD']) p.x += p.speed * dt;

        // Пули
        state.bullets.forEach((b, i) => {
            b.x += b.vx * dt;
            b.y += b.vy * dt;
            if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) state.bullets.splice(i, 1);
        });

        // Частицы
        state.particles.forEach((part, i) => {
            part.x += part.vx * dt;
            part.y += part.vy * dt;
            part.life -= dt * 2;
            if(part.life <= 0) state.particles.splice(i, 1);
        });

        // Враги
        state.enemies.forEach((en, ei) => {
            const angle = Math.atan2(p.y - en.y, p.x - en.x);
            en.x += Math.cos(angle) * en.speed * dt;
            en.y += Math.sin(angle) * en.speed * dt;

            // Коллизия с пулями
            state.bullets.forEach((b, bi) => {
                if (Math.hypot(b.x - en.x, b.y - en.y) < en.radius) {
                    en.hp -= 10;
                    state.bullets.splice(bi, 1);
                    if (en.hp <= 0) {
                        createExplosion(en.x, en.y, en.color);
                        state.enemies.splice(ei, 1);
                        p.score++;
                        document.getElementById('score').innerText = p.score;
                    }
                }
            });

            // Урон игроку
            if (Math.hypot(en.x - p.x, en.y - p.y) < en.radius + p.radius) {
                p.hp -= 10 * dt;
                document.getElementById('hp').innerText = Math.ceil(p.hp);
                if (p.hp <= 0) location.reload();
            }
        });
    }

    function drawHealthBar(x, y, radius, hp, maxHp) {
        const width = radius * 2.5;
        const height = 6;
        ctx.fillStyle = '#333';
        ctx.fillRect(x - width/2, y - radius - 15, width, height);
        ctx.fillStyle = hp > maxHp * 0.3 ? '#2ecc71' : '#e74c3c';
        ctx.fillRect(x - width/2, y - radius - 15, width * (hp/maxHp), height);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Сетка с параллаксом (условно)
        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        for(let i=0; i<canvas.width; i+=50) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
        }
        for(let i=0; i<canvas.height; i+=50) {
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
        }

        // Рендер частиц
        state.particles.forEach(p => {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
        });
        ctx.globalAlpha = 1.0;

        // Рендер игрока
        ctx.shadowBlur = 15; ctx.shadowColor = state.player.color;
        ctx.fillStyle = state.player.color;
        ctx.beginPath(); ctx.arc(state.player.x, state.player.y, state.player.radius, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
        drawHealthBar(state.player.x, state.player.y, state.player.radius, state.player.hp, state.player.maxHp);

        // Рендер врагов
        state.enemies.forEach(en => {
            ctx.fillStyle = en.color;
            ctx.beginPath(); ctx.arc(en.x, en.y, en.radius, 0, Math.PI*2); ctx.fill();
            drawHealthBar(en.x, en.y, en.radius, en.hp, en.maxHp);
        });

        // Рендер пуль
        state.bullets.forEach(b => {
            ctx.fillStyle = b.color;
            ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2); ctx.fill();
        });
    }

    function loop(time) {
        const dt = (time - state.lastTime) / 1000;
        state.lastTime = time;

        if(dt < 0.1) { // Защита от скачков при переключении вкладок
            update(dt);
            draw();
        }
        requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
</script>
</body>
</html>
